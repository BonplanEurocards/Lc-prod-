<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORLD CLASS STUDIO - PROD EXPRESS</title>
    <style>
        :root { --gold: #d4af37; --neon: #00ff88; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        
        .studio-unit {
            width: 100%; max-width: 440px; background: linear-gradient(145deg, #151515, #0a0a0a);
            border: 1px solid #333; border-radius: 40px; padding: 30px; box-shadow: 0 40px 80px rgba(0,0,0,0.9);
        }

        .display-pro {
            background: #000; border: 1px solid #222; border-radius: 15px;
            padding: 20px; margin-bottom: 25px; text-align: center;
            box-shadow: inset 0 0 20px rgba(0,255,136,0.1);
        }

        .status-led { height: 10px; width: 10px; background: var(--neon); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--neon); margin-right: 10px; }

        .btn-import { 
            background: var(--gold); color: black; border: none; padding: 22px; 
            width: 100%; border-radius: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.9rem;
        }

        .controls-area { display: none; margin-top: 25px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .rack-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        
        .btn-download { 
            background: #ff0000; color: white; border: none; padding: 22px; 
            width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1rem;
        }

        input[type="range"] { width: 100%; accent-color: var(--neon); height: 10px; }
        audio { width: 100%; filter: invert(1); margin-top: 15px; border-radius: 30px; }
    </style>
</head>
<body>

<div class="studio-unit">
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="letter-spacing: 4px; font-weight: 900; margin:0; color:var(--gold);">WORLD STUDIO</h2>
        <span style="font-size: 0.6rem; color: #555;">MASTERING ENGINE V11 • ULTRA FIDELITY</span>
    </div>
    
    <div class="display-pro" id="msg">ATTENTE DU SIGNAL...</div>

    <input type="file" id="fIn" accept="audio/*,video/*" style="display:none">
    <button class="btn-import" onclick="document.getElementById('fIn').click()" id="loadBtn">IMPORTER POUR MASTERING</button>

    <div id="ui" class="controls-area">
        <div class="rack-card">
            <div style="font-size: 0.7rem; color: #888; margin-bottom: 10px;">RYTHME & VITESSE : <span id="sVal" style="color:white">1.0</span>x</div>
            <input type="range" id="sRange" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>

        <div class="rack-card">
            <div style="font-size: 0.7rem; color: var(--neon); margin-bottom: 10px;">
                <span class="status-led"></span> TRAITEMENT MONDIAL ACTIVÉ
            </div>
            <p style="font-size: 0.6rem; color: #666; margin: 0;">Collision Sidechain + Crystal Voice + Bass Maximizer</p>
            <audio id="player" controls playsinline></audio>
        </div>

        <button id="recBtn" class="btn-download">TÉLÉCHARGER LE MASTER (.MP3)</button>
    </div>
</div>

<script>
    let audioCtx, source, mediaRecorder, chunks = [];

    const fIn = document.getElementById('fIn');
    const player = document.getElementById('player');
    const msg = document.getElementById('msg');
    const ui = document.getElementById('ui');
    const recBtn = document.getElementById('recBtn');

    fIn.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            player.src = URL.createObjectURL(file);
            msg.innerHTML = "<span style='color:#00ff88'>ANALYSE TERMINÉE</span>";
            document.getElementById('loadBtn').style.display = "none";
            ui.style.display = "block";
            initWorldStudio();
        }
    };

    function initWorldStudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(player);

            // --- CHAÎNE DE MASTERING MONDIAL ---
            
            // 1. BASSES SUB (Pour le beat)
            const bass = audioCtx.createBiquadFilter();
            bass.type = "lowshelf"; bass.frequency.value = 80; bass.gain.value = 14;

            // 2. PRÉSENCE VOCALE (Sortir la voix du mix)
            const presence = audioCtx.createBiquadFilter();
            presence.type = "peaking"; presence.frequency.value = 2800; presence.gain.value = 12;

            // 3. SATURATION (Chaleur Studio)
            const shaper = audioCtx.createWaveShaper();
            function makeDistortionCurve(amount) {
                let k = typeof amount === 'number' ? amount : 50,
                    n_samples = 44100, curve = new Float32Array(n_samples);
                for (let i = 0 ; i < n_samples; ++i ) {
                    let x = i * 2 / n_samples - 1;
                    curve[i] = ( 3 + k ) * x * 20 * (Math.PI / 180) / ( Math.PI + k * Math.abs(x) );
                }
                return curve;
            }
            shaper.curve = makeDistortionCurve(10); // Légère chaleur

            // 4. COMPRESSEUR DE COLLISION (Glue)
            const comp = audioCtx.createDynamicsCompressor();
            comp.threshold.value = -35; 
            comp.ratio.value = 12;
            comp.attack.value = 0.003;

            // Connexion Finale
            source.connect(bass);
            bass.connect(presence);
            presence.connect(shaper);
            shaper.connect(comp);
            comp.connect(audioCtx.destination);
        }
    }

    document.getElementById('sRange').oninput = function() {
        player.playbackRate = this.value;
        document.getElementById('sVal').innerText = this.value;
    };

    recBtn.onclick = () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        if (recBtn.innerText === "TÉLÉCHARGER LE MASTER (.MP3)") {
            chunks = [];
            const stream = player.captureStream ? player.captureStream() : player.mozCaptureStream();
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/mp3' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "MASTER_STUDIO_MONDIAL.mp3";
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            };
            mediaRecorder.start();
            player.play();
            recBtn.innerText = "ENREGISTREMENT... (STOP)";
            msg.innerText = "RENDU EN COURS...";
        } else {
            mediaRecorder.stop();
            player.pause();
            recBtn.innerText = "TÉLÉCHARGER LE MASTER (.MP3)";
            msg.innerText = "TRAITEMENT RÉUSSI";
        }
    };
</script>
</body>
</html>
